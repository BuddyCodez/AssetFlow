name: odoo-hackathon-2026

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    init: true
    ports:
      - "3000:3000"
    env_file:
      - path: apps/server/.env
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
